<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生产环境认证证书 - XuanFengMen</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border-color: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --blue: #58a6ff;
  --green: #3fb950;
  --orange: #f0883e;
  --red: #f85149;
  --purple: #bc8cff;
  --gold: #ffd700;
  --gold-dark: #b8960c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 720px;
  margin: 40px auto;
  padding: 24px;
}

/* Certificate Style */
.certificate {
  background: linear-gradient(135deg, #1a1f2b, #141820);
  border: 3px solid var(--gold);
  border-radius: 16px;
  padding: 60px 48px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(255,215,0,0.05);
}
.certificate::before {
  content: '';
  position: absolute;
  top: 8px;
  left: 8px;
  right: 8px;
  bottom: 8px;
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 12px;
  pointer-events: none;
}
.certificate::after {
  content: '';
  position: absolute;
  top: 16px;
  left: 16px;
  right: 16px;
  bottom: 16px;
  border: 1px dashed rgba(255,215,0,0.15);
  border-radius: 8px;
  pointer-events: none;
}

.cert-header {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}
.cert-badge {
  display: inline-block;
  margin-bottom: 16px;
}
.cert-title {
  font-size: 32px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 4px;
  margin-bottom: 8px;
}
.cert-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  letter-spacing: 2px;
}
.cert-divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto;
}

.cert-id {
  text-align: center;
  margin-bottom: 32px;
  position: relative;
  z-index: 1;
}
.cert-id-label {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 1px;
}
.cert-id-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 2px;
  margin-top: 4px;
}

.cert-status {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}
.cert-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(63,185,80,0.1);
  border: 2px solid var(--green);
  border-radius: 12px;
  padding: 12px 32px;
  font-size: 22px;
  font-weight: 800;
  color: var(--green);
  letter-spacing: 3px;
}

.cert-body {
  position: relative;
  z-index: 1;
  margin-bottom: 40px;
}
.cert-body-title {
  text-align: center;
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  letter-spacing: 1px;
}
.cert-standards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.cert-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  transition: background 0.2s;
}
.cert-item:hover { background: #282e36; }
.cert-check {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(63,185,80,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cert-item-text {
  font-size: 14px;
  font-weight: 600;
}

.cert-footer {
  text-align: center;
  position: relative;
  z-index: 1;
}
.cert-dates {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin-bottom: 24px;
}
.cert-date-block {}
.cert-date-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.cert-date-value {
  font-size: 15px;
  font-weight: 600;
  margin-top: 4px;
}

.cert-seal {
  display: inline-block;
  width: 80px;
  height: 80px;
  border: 3px solid var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  position: relative;
}
.cert-seal::before {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 50%;
}
.cert-seal-text {
  text-align: center;
}
.cert-seal-text .main { font-size: 11px; font-weight: 800; color: var(--gold); letter-spacing: 1px; }
.cert-seal-text .sub { font-size: 8px; color: var(--gold-dark); letter-spacing: 1px; }

.cert-watermark {
  position: absolute;
  bottom: 60px;
  right: 60px;
  opacity: 0.03;
  font-size: 120px;
  font-weight: 800;
  color: var(--gold);
  transform: rotate(-15deg);
  pointer-events: none;
  z-index: 0;
}

.cert-meta {
  margin-top: 32px;
  text-align: center;
  position: relative;
  z-index: 1;
}
.cert-meta .version {
  display: inline-block;
  background: var(--gold);
  color: #000;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 12px;
  letter-spacing: 1px;
}

@media (max-width: 640px) {
  .certificate { padding: 40px 24px; }
  .cert-title { font-size: 24px; letter-spacing: 2px; }
  .cert-standards { grid-template-columns: 1fr; }
  .cert-dates { flex-direction: column; gap: 16px; }
  .cert-status-badge { font-size: 18px; padding: 10px 24px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="certificate">
    <div class="cert-watermark">XFM</div>

    <!-- Header -->
    <div class="cert-header">
      <div class="cert-badge">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </div>
      <div class="cert-title">PRODUCTION CERTIFICATE</div>
      <div class="cert-subtitle">生产环境认证证书</div>
      <div class="cert-divider"></div>
    </div>

    <!-- Certification ID -->
    <div class="cert-id">
      <div class="cert-id-label">CERTIFICATION NUMBER</div>
      <div class="cert-id-value">XFM-PROD-2026-0712</div>
    </div>

    <!-- Status -->
    <div class="cert-status">
      <div class="cert-status-badge">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        APPROVED
      </div>
    </div>

    <!-- Standards -->
    <div class="cert-body">
      <div class="cert-body-title">8 项认证标准全部通过</div>
      <div class="cert-standards">
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">代码质量</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">安全合规</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">性能指标</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">测试覆盖</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">SEO 标准</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">可观测性</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">文档完整</span>
        </div>
        <div class="cert-item">
          <div class="cert-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="cert-item-text">运维就绪</span>
        </div>
      </div>
    </div>

    <!-- Dates -->
    <div class="cert-footer">
      <div class="cert-dates">
        <div class="cert-date-block">
          <div class="cert-date-label">签发日期</div>
          <div class="cert-date-value">2026-07-12</div>
        </div>
        <div class="cert-date-block">
          <div class="cert-date-label">有效期</div>
          <div class="cert-date-value">6 个月</div>
        </div>
        <div class="cert-date-block">
          <div class="cert-date-label">到期日期</div>
          <div class="cert-date-value">2027-01-12</div>
        </div>
      </div>

      <!-- Seal -->
      <div class="cert-seal">
        <div class="cert-seal-text">
          <div class="main">XFM</div>
          <div class="sub">CERTIFIED</div>
        </div>
      </div>

      <div class="cert-meta" style="margin-top:24px;">
        <span class="version">V1.2 REAL PRODUCTION</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
